version: "3.8"

services:
  cinego_backend:
    image: lean2708/cinego_backend:1.0.0
    container_name: cinego_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres_cinego
      - redis_cinego
    networks:
      - cinego_network


  postgres_cinego:
    image: postgres:16
    container_name: postgres_cinego
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_cinego_data:/var/lib/postgresql/data
    networks:
      - cinego_network
  

  redis_cinego:
    image: redis:7-alpine
    container_name: redis_cinego
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_cinego_data:/data
    networks:
      - cinego_network

volumes:
  postgres_cinego_data:
  redis_cinego_data:

networks:
  cinego_network:
    driver: bridge